
<!DOCTYPE html>
<html lang="es">

    <head>

        <meta charset="UTF-8">

        <title>calculadora</title>

       
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        

    </head>

<body class="d-flex justify-content-center align-items-center vh-100" style="background-color: #f0c1e8;">

    <!-- Carcasa de la calculadora con estética de anime -->
    <div class="card p-4 border border-4 border-dark rounded-4 shadow" style="background-color: #aa5795; max-width: 340px; width: 100%;"> </div>
        
        <h1 class="text-center h5 mb-3 fw-bold text-dark" style="font-family: 'impact', sans-serif;">✨CALCULADORA✨</h1>
        
        <!-- Aquí irá la pantalla -->
        <div class="form-control bg-light text-dark text-center mb-3" id="pantalla" style="height: 60px; font-size: 24px; display: flex; align-items: center; justify-content: center;">
            
        </div>
    
       <div id="resultado"></div>  
        


        <!-- Aquí irán los bo<!-- Fila 1 de botones -->
<div class="row g-2 mb-2">
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;">7</button></div>
    <div class="col-3">
        
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;">8</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;">9</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;">÷</button></div>  

    </div>

<div class="row g-2 mb-2">
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #a32c99;">4</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #d62ec8;">5</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #d62ec8;">6</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #ad5aa6;">×</button></div>
       
    </div>

  <div class="row g-2 mb-2">
      
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #9c7699;">1</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #c25080;">2</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #48e97e;">3</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #c25080;">-</button></div>

  </div>  

<div class="row g-2 mb-2">

    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #48e97e;">C</button></div>
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #48e97e;">0</button></div> 
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #c1eb4d;">=</button></div> 
    <div class="col-3">
        <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #ee933e;">+</button></div> 
    
    </div>
    
    </body>
       
</html>
