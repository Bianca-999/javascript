        <input type="number" placeholder="Ingrese el primer número" id="numero1">

        <input type="number" placeholder="Ingrese el segundo número" id="numero2">
    
        <button onclick="sumar();">Sumar </button>

        <button onclick="restar();">Restar </button>
    
        <button onclick="multiplicar();">Multiplicar </button>
        
        <button onclick="dividir();">Dividir </button>
       
        <div id="resultado"></div>  
               
        <script>

            function sumar() {             

                //Recupero los datos desde los input

                let numero_1 = document.getElementById("numero1").value;

                let numero_2 = document.getElementById("numero2").value;

                //Realizo la operación aritmética

                let resultado = Number(numero_1) + Number(numero_2);
 
                 document.getElementById("resultado").innerHTML = "<p>" + resultado + "</p>";
                }
