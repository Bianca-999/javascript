<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Anime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center justify-content-center vh-100" style="background-color: #955aee !important;">

    <div class="card p-4 border border-4 border-dark rounded-4 shadow" style="background-color: #aa5795; max-width: 340px; width: 100%;">
        
        <h1 class="text-center h5 mb-3 fw-bold text-dark" style="font-family: 'Impact', sans-serif;">✨CALCULADORA✨</h1>
        
        <div class="mb-3">
            <input type="text" id="pantalla" class="form-control text-end fw-bold fs-4 border border-3 border-dark bg-light text-dark rounded-3 p-2" readonly value="0">
        </div>
        
        <div class="container-fluid p-0">
            
            <div class="row g-2 mb-2">
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;" onclick="presionarBoton('7')">7</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;" onclick="presionarBoton('8')">8</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;" onclick="presionarBoton('9')">9</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #158fb8;" onclick="presionarBoton('/')">÷</button>
                </div>  
            </div>

            <div class="row g-2 mb-2">
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #a32c99;" onclick="presionarBoton('4')">4</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #d62ec8;" onclick="presionarBoton('5')">5</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #ad5aa6;" onclick="presionarBoton('6')">6</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #9c7699;" onclick="presionarBoton('*')">×</button>
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #c25080;" onclick="presionarBoton('1')">1</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #48e97e;" onclick="presionarBoton('2')">2</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #c25080;" onclick="presionarBoton('3')">3</button>
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #48e97e;" onclick="presionarBoton('-')">-</button>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #48e97e;" onclick="limpiar()">C</button> 
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #c1eb4d;" onclick="presionarBoton('0')">0</button> 
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #ee933e;" onclick="calcular()">=</button> 
                </div>
                <div class="col-3">
                    <button class="btn fw-bold border border-3 border-dark rounded-3 w-100 py-3 text-dark shadow-sm" style="background-color: #ee3e3e;" onclick="presionarBoton('+')">+</button> 
                </div>
            </div>

        </div>

    </div>

    <script>
        const pantalla = document.getElementById('pantalla');

        function presionarBoton(valor) {
            if (pantalla.value === '0' || pantalla.value === 'Error') {
                pantalla.value = valor;
            } else {
                pantalla.value += valor;
